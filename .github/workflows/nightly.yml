name: Nightly E2E

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:

# The E2E tier runs on a virtual iPhone (vphone-cli) inside a SIP-disabled
# Tart VM — see docs/TEST_STRATEGY.md §7. We need a self-hosted runner
# because (a) Tart requires Apple Silicon + Virtualization.framework, and
# (b) vphone-cli requires SIP disabled, which we cannot do on
# GitHub-hosted `macos-14` runners. See §7.8 for the nested-virt risk
# callout; fallback is the same workflow pointed at a bare-metal Mac mini.
jobs:
  e2e:
    runs-on: [self-hosted, macOS, apple-silicon, tart]
    timeout-minutes: 90
    env:
      # Local Tart image on the self-hosted runner's host — see
      # docs/TEST_FIXTURES.md §5 for the "reuse bld-e2e-base" decision.
      # No `tart pull` / GHCR round-trip because the only place this
      # workflow ever runs is a host that already has the base image
      # (the "only-Tart-VM" scope decision in docs/RUNNER.md §1).
      TART_BASE_IMAGE: bld-e2e-base
      TART_VM: meow-nightly-${{ github.run_id }}
      VPHONE_SOCK: /tmp/vphone.sock
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone ephemeral VM from local base image
        run: |
          brew list tart >/dev/null 2>&1 || brew install cirruslabs/cli/tart
          tart clone "$TART_BASE_IMAGE" "$TART_VM"

      - name: Boot VM and wait for SSH
        run: |
          # --nested: vphone-cli inside the guest runs the virtual iPhone via
          # Virtualization.framework, so the outer Tart VM needs nested-virt
          # enabled. Requires Apple Silicon M3 or later on the runner host.
          tart run "$TART_VM" --no-graphics --nested &
          for i in $(seq 1 60); do
            VM_IP=$(tart ip "$TART_VM" 2>/dev/null || true)
            [ -n "$VM_IP" ] && ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 admin@$VM_IP 'true' 2>/dev/null && break
            sleep 2
          done
          echo "VM_IP=$VM_IP" >> "$GITHUB_ENV"

      - name: Build unsigned .ipa on host
        run: |
          brew install xcodegen xcbeautify
          xcodegen generate
          xcodebuild archive \
            -project meow-ios.xcodeproj \
            -scheme meow-ios \
            -configuration Release \
            -archivePath build/meow-ios.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Install .ipa into virtual iPhone via vphone-cli
        run: |
          # Copy archive into VM, boot the virtual iPhone, install the app.
          scp -r build/meow-ios.xcarchive admin@$VM_IP:~/meow-ios.xcarchive
          ssh admin@$VM_IP 'vphone-cli boot --firmware regular --sock /tmp/vphone.sock'
          ssh admin@$VM_IP 'vphone-cli install ~/meow-ios.xcarchive/Products/Applications/meow-ios.app'

      - name: Run 5-check connectivity gate
        run: |
          # The script speaks the vm/vphone.sock protocol (see §7.5) to
          # drive the app through its diagnostics panel and asserts the
          # five Android-parity checks.
          VPHONE_HOST="admin@$VM_IP" scripts/test-e2e-ios.sh

      - name: Run performance benchmarks (memory ceiling + latency)
        run: |
          # xcodebuild test -only-testing:MeowIntegrationTests/Performance ...
          echo "Perf benchmarks — enable after T7.4"

      - name: Compare to baseline
        run: |
          # scripts/compare-perf.py build/perf.json tests/perf/baseline.json
          echo "Baseline comparison — enable after T7.4"

      - name: Collect screenshots & vphone-cli event log from VM
        if: always()
        run: |
          mkdir -p build/e2e
          scp -r admin@$VM_IP:~/vphone-output/ build/e2e/ || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: |
            build/*.trace
            build/e2e/**
            build/perf.json

      - name: Tear down VM
        if: always()
        run: tart delete "$TART_VM" || true

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"Nightly E2E failed on main — see '"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'"}' \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
